<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LaserBox — Générateur maquette médiévale</title>
<style>
/* ── RESET & BASE ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0:   #0c0d10;
  --bg1:   #12141a;
  --bg2:   #191c24;
  --bg3:   #20232d;
  --line:  #262a38;
  --line2: #303548;
  --accent:#3d6bb5;
  --acc2:  #2a4e8a;
  --red:   #e8341a;
  --text0: #c8d4e8;
  --text1: #7a90b0;
  --text2: #4a5a72;
  --text3: #2e3a4e;
  --wood:  #c8943e;
  --ok:    #2d8a54;
  --warn:  #c07020;
  --font-mono: 'Courier New', Courier, monospace;
  --font-ui:   system-ui, -apple-system, sans-serif;
  --radius: 5px;
}

body {
  background: var(--bg0);
  color: var(--text0);
  font-family: var(--font-ui);
  font-size: 13px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── LAYOUT ────────────────────────────────────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--bg1);
  flex-shrink: 0;
}
.app-header h1 {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text1);
  letter-spacing: .06em;
}
.badge {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: .12em;
  color: var(--text2);
  border: 1px solid var(--line2);
  border-radius: 2px;
  padding: 2px 6px;
  text-transform: uppercase;
}
.app-header .spacer { flex: 1; }
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  transition: background .3s;
}
.status-dot.ok   { background: var(--ok);   box-shadow: 0 0 6px var(--ok); }
.status-dot.busy { background: var(--warn); box-shadow: 0 0 6px var(--warn); }

.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ────────────────────────────────────────────────────── */
.sidebar {
  width: 270px;
  flex-shrink: 0;
  background: var(--bg1);
  border-right: 1px solid var(--line);
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.section {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  user-select: none;
  background: var(--bg3);
}
.section-head:hover { background: var(--bg2); }
.section-head span {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text1);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.section-head .chevron {
  font-size: 8px;
  color: var(--text2);
  transition: transform .2s;
}
.section-head.open .chevron { transform: rotate(180deg); }
.section-body { padding: 10px; display: flex; flex-direction: column; gap: 7px; }
.section-body.hidden { display: none; }

/* ── FORM CONTROLS ─────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 3px; }
.field label {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: .05em;
  text-transform: uppercase;
}
.field input[type=number],
.field input[type=text],
.field select,
.field input[type=file] {
  background: var(--bg0);
  border: 1px solid var(--line);
  color: var(--text0);
  padding: 5px 7px;
  border-radius: 3px;
  font-size: 12px;
  font-family: var(--font-mono);
  width: 100%;
  transition: border-color .15s;
  outline: none;
}
.field input:focus, .field select:focus { border-color: var(--acc2); }
.field input[type=file] { cursor: pointer; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }

/* Checkbox */
.check-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 7px;
  border-radius: 3px;
  border: 1px solid var(--line);
  background: var(--bg1);
  cursor: pointer;
  transition: border-color .15s;
}
.check-row:hover { border-color: var(--line2); }
.check-row input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
.check-row label {
  font-size: 11px;
  color: var(--text1);
  cursor: pointer;
  flex: 1;
}

/* Addon face block */
.face-block {
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 4px;
}
.face-head {
  background: var(--bg3);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.face-body { padding: 7px; display: flex; flex-direction: column; gap: 5px; }
.addon-row {
  display: grid;
  grid-template-columns: auto 1fr 60px;
  align-items: center;
  gap: 6px;
}
.addon-row input[type=checkbox] { accent-color: var(--accent); }
.addon-row label { font-size: 11px; color: var(--text1); }
.addon-row input[type=number] {
  background: var(--bg0);
  border: 1px solid var(--line);
  color: var(--text0);
  padding: 3px 5px;
  border-radius: 3px;
  font-size: 11px;
  font-family: var(--font-mono);
  text-align: center;
}

/* Buttons */
.btn-primary, .btn-secondary {
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .15s, filter .15s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--acc2), var(--accent));
  color: #c8d8f0;
}
.btn-primary:hover { filter: brightness(1.15); }
.btn-secondary {
  background: var(--bg3);
  color: var(--text1);
  border: 1px solid var(--line2);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--text0); }
.btn-secondary:disabled { opacity: .35; cursor: not-allowed; }

/* Legend */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 6px 8px;
  background: var(--bg2);
  border-radius: 3px;
  border: 1px solid var(--line);
}
.li { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text2); }
.ld { display: inline-block; width: 16px; height: 2px; border-radius: 1px; }

/* ── MAIN AREA ──────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.info-bar {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 5px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text2);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.info-bar .chip {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 2px 8px;
}
.warn-list {
  padding: 6px 14px;
  background: rgba(200,112,32,.07);
  border-bottom: 1px solid rgba(200,112,32,.2);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--warn);
  display: none;
}
.warn-list.visible { display: block; }

.preview {
  flex: 1;
  overflow: auto;
  background: #e8e2d8;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 12px;
}
.preview svg {
  display: block;
  max-width: 100%;
  height: auto;
  background: #f0ebe1;
  box-shadow: 0 2px 16px rgba(0,0,0,.4);
}
.preview-placeholder {
  color: #999;
  font-family: var(--font-mono);
  font-size: 12px;
  margin: auto;
}

/* ── TOGGLE LABELS BUTTON ────────────────────────────────────────── */
.layer-toggles {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 6px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg1);
  flex-shrink: 0;
}
.toggle-btn {
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 3px 10px;
  border-radius: 2px;
  border: 1px solid var(--line2);
  background: var(--bg2);
  color: var(--text1);
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .15s;
}
.toggle-btn.active { border-color: var(--accent); color: var(--text0); background: var(--bg3); }
.toggle-btn:hover  { border-color: var(--line2); }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────── -->
<div class="app-header">
  <div class="badge">LaserBox</div>
  <h1>Générateur maquette médiévale</h1>
  <div class="spacer"></div>
  <div id="status" class="status-dot"></div>
</div>

<!-- ── BODY ──────────────────────────────────────────────────────── -->
<div class="app-body">

  <!-- ── SIDEBAR ────────────────────────────────────────────────── -->
  <aside class="sidebar">

    <!-- Section : Boîte -->
    <div class="section" id="sec-box">
      <div class="section-head open" onclick="toggleSection(this)">
        <span>Boîte</span><span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="row3">
          <div class="field"><label>X mm</label><input type="number" id="iX" value="100" min="10" step="5"></div>
          <div class="field"><label>Y mm</label><input type="number" id="iY" value="100"  min="10" step="5"></div>
          <div class="field"><label>Z mm</label><input type="number" id="iZ" value="80"  min="10" step="5"></div>
        </div>
        <div class="row2">
          <div class="field">
            <label>Étages</label>
            <input type="number" id="iFloors" value="1" min="1" max="4">
          </div>
          <div class="field">
            <label>Échelle 1/N</label>
            <input type="number" id="iScale" value="56" min="10" max="300">
          </div>
        </div>
        <div class="field">
          <label>Mode</label>
          <select id="iMode">
            <option value="closed">Fermée — 6 faces</option>
            <option value="open">Ouverte — sans dessus</option>
            <option value="frame">Cadre — 4 faces latérales</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Section : Matériau -->
    <div class="section">
      <div class="section-head open" onclick="toggleSection(this)">
        <span>Matériau &amp; découpe</span><span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="row2">
          <div class="field"><label>Épaisseur (mm)</label><input type="number" id="iMat" value="3" min="0.5" max="10" step="0.5"></div>
          <div class="field"><label>Largeur encoche</label><input type="number" id="iFW"  value="5" min="1"   max="20" step="0.5"></div>
        </div>
        <div class="row2">
          <div class="field">
            <label>Kerf laser (mm)</label>
            <input type="number" id="iKerf" value="0.1" min="0" max="1" step="0.05">
          </div>
          <div class="field" style="justify-content:flex-end">
            <label style="font-size:9px;color:var(--text3);line-height:1.4">
              Offset appliqué<br>aux mortaises uniquement.<br>Tenons = épaisseur exacte.
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Section : Texture -->
    <div class="section">
      <div class="section-head open" onclick="toggleSection(this)">
        <span>Texture gravure</span><span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label>Fichier SVG ou PNG/JPG</label>
          <input type="file" id="iTex" accept=".svg,image/png,image/jpeg">
        </div>
        <div class="field">
          <label>DPI source</label>
          <input type="number" id="iDPI" value="300" min="72" max="1200">
        </div>
      </div>
    </div>

    <!-- Section : Add-ons -->
    <div class="section">
      <div class="section-head open" onclick="toggleSection(this)">
        <span>Add-ons</span><span class="chevron">▼</span>
      </div>
      <div class="section-body" id="addons-body">
        <!-- Injecté par buildAddonUI() -->
      </div>
    </div>

    <!-- Actions -->
    <button class="btn-primary" id="btn-gen">Générer ↗</button>
    <button class="btn-secondary" id="btn-dl" disabled>⬇ Télécharger SVG</button>

    <div class="legend">
      <div class="li"><div class="ld" style="background:#FF0000"></div>Découpe</div>
      <div class="li"><div class="ld" style="background:#111;height:6px;border-radius:1px"></div>Gravure</div>
      <div class="li"><div class="ld" style="background:rgba(60,100,220,.4);height:6px;border-radius:1px"></div>Étiquettes</div>
    </div>

  </aside>

  <!-- ── MAIN ─────────────────────────────────────────────────── -->
  <div class="main">
    <div class="info-bar" id="info-bar">
      <span>En attente de génération…</span>
    </div>
    <div class="warn-list" id="warn-list"></div>
    <div class="layer-toggles" id="layer-toggles" style="display:none">
      <span style="font-size:10px;color:var(--text2);font-family:monospace;margin-right:4px">Calques :</span>
      <button class="toggle-btn active" data-layer="layer-cut">Découpe</button>
      <button class="toggle-btn active" data-layer="layer-engrave">Gravure</button>
      <button class="toggle-btn active" data-layer="layer-labels">Étiquettes</button>
    </div>
    <div class="preview" id="preview">
      <p class="preview-placeholder">Configure les paramètres et clique sur Générer.</p>
    </div>
  </div>

</div>

<!-- ── SCRIPT ────────────────────────────────────────────────────── -->
<script type="module">
import { generateMainWall }                    from './main_wall.js';
import { createBuildParams, createAddonRequest,
         ADDON_FACES, FACE_NAMES }             from './face_model.js';
import { loadPattern }                         from './svg_builder.js';
import meurtiereModule                         from './meurtiere.js';
import { default as fenetreAMeneauxModule }    from './addons/fenetre-a-meneaux.js';

// ── Registre de tous les add-ons disponibles ──────────────────────
const ADDONS = [meurtiereModule, fenetreAMeneauxModule];
// Pour ajouter un futur add-on : importer son module et l'ajouter ici.

// ── État courant ──────────────────────────────────────────────────
let _builder = null;

// ── UI : toggle sections ──────────────────────────────────────────
window.toggleSection = function(head) {
  head.classList.toggle('open');
  head.nextElementSibling.classList.toggle('hidden');
};

// ── UI : construction des blocs add-ons par face ──────────────────
function buildAddonUI() {
  const container = document.getElementById('addons-body');
  container.innerHTML = '';

  for (const faceId of ADDON_FACES) {
    const block = document.createElement('div');
    block.className = 'face-block';

    const head = document.createElement('div');
    head.className = 'face-head';
    head.textContent = FACE_NAMES[faceId] || faceId;
    block.appendChild(head);

    const body = document.createElement('div');
    body.className = 'face-body';

    for (const addon of ADDONS) {
      const row = document.createElement('div');
      row.className = 'addon-row';

      const cbId = `cb-${faceId}-${addon.id}`;
      const numId = `num-${faceId}-${addon.id}`;

      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.id = cbId;
      cb.setAttribute('data-face', faceId);
      cb.setAttribute('data-addon', addon.id);

      const lbl = document.createElement('label');
      lbl.htmlFor = cbId;
      lbl.textContent = addon.label;

      const num = document.createElement('input');
      num.type = 'number'; num.id = numId;
      num.value = 1; num.min = 1; num.max = 8;
      num.setAttribute('data-face', faceId);
      num.setAttribute('data-addon', addon.id);
      num.disabled = true;

      cb.addEventListener('change', () => { num.disabled = !cb.checked; });

      row.appendChild(cb);
      row.appendChild(lbl);
      row.appendChild(num);
      body.appendChild(row);
    }

    block.appendChild(body);
    container.appendChild(block);
  }
}

// ── Lecture des addon requests depuis l'UI ───────────────────────
function readAddonRequests() {
  const requests = [];
  const addonMap = Object.fromEntries(ADDONS.map(a => [a.id, a]));

  for (const cb of document.querySelectorAll('[data-face][data-addon][type=checkbox]')) {
    if (!cb.checked) continue;
    const faceId  = cb.getAttribute('data-face');
    const addonId = cb.getAttribute('data-addon');
    const count   = parseInt(
      document.getElementById(`num-${faceId}-${addonId}`)?.value || '1', 10
    );
    const module  = addonMap[addonId];
    if (module) requests.push(createAddonRequest(faceId, module, count, {}));
  }
  return requests;
}

// ── Lecture des params UI ────────────────────────────────────────
function readParams() {
  return createBuildParams({
    X:       parseFloat(document.getElementById('iX').value)      || 100,
    Y:       parseFloat(document.getElementById('iY').value)      || 50,
    Z:       parseFloat(document.getElementById('iZ').value)      || 40,
    nFloors: parseInt  (document.getElementById('iFloors').value) || 1,
    scaleN:  parseFloat(document.getElementById('iScale').value)  || 56,
    mat:     parseFloat(document.getElementById('iMat').value)    || 3,
    fw:      parseFloat(document.getElementById('iFW').value)     || 5,
    kerf:    parseFloat(document.getElementById('iKerf').value)   ?? 0.1,
    mode:    document.getElementById('iMode').value,
    padMM:   12,
    minSpacing: 8,
  });
}

// ── STATUS DOT ───────────────────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById('status');
  dot.className = 'status-dot' + (s ? ' ' + s : '');
}

// ── GENERATE ─────────────────────────────────────────────────────
async function generate() {
  setStatus('busy');
  document.getElementById('btn-gen').disabled = true;

  try {
    const params   = readParams();
    const requests = readAddonRequests();

    // Texture
    let texDef = null;
    const texFile = document.getElementById('iTex').files[0];
    const dpi     = parseFloat(document.getElementById('iDPI').value) || 300;
    if (texFile) {
      texDef = await loadPattern(texFile, dpi);
    }

    // Build
    const builder = await generateMainWall(params, requests, texDef);
    _builder = builder;

    // Display (swap mm dimensions for responsive display)
    const svgStr = builder.build();
    const displaySVG = svgStr
      .replace(/width="[\d.]+mm"/, 'style="display:block;max-width:100%;height:auto"')
      .replace(/height="[\d.]+mm"/, '');

    const preview = document.getElementById('preview');
    preview.innerHTML = displaySVG;

    // Layer toggles
    document.getElementById('layer-toggles').style.display = 'flex';
    for (const btn of document.querySelectorAll('.toggle-btn')) {
      btn.classList.add('active');
      const layer = preview.querySelector('#' + btn.dataset.layer);
      if (layer) layer.style.display = '';
    }

    // Info bar
    const { X, Y, Z, nFloors, scaleN } = params;
    const totalY = Y * nFloors;
    const area   = 2 * (X * totalY + X * Z + totalY * Z);
    document.getElementById('info-bar').innerHTML =
      `<span class="chip">1/${scaleN}</span>` +
      `<span>Boîte ${X}×${totalY}×${Z} mm</span>` +
      `<span>Surface: ${area.toFixed(0)} mm²</span>` +
      `<span>Volume: ${(X*totalY*Z).toFixed(0)} mm³</span>` +
      `<span>${requests.length} add-on(s)</span>`;

    // Warnings (from SVG text elements with red fill)
    const warns = [...preview.querySelectorAll('#layer-labels text')]
      .filter(el => el.getAttribute('fill') === '#e8341a')
      .map(el => el.textContent.replace(/^⚠\s*/, ''));
    const warnEl = document.getElementById('warn-list');
    if (warns.length) {
      warnEl.innerHTML = warns.map(w => `⚠ ${w}`).join('<br>');
      warnEl.classList.add('visible');
    } else {
      warnEl.classList.remove('visible');
    }

    document.getElementById('btn-dl').disabled = false;
    setStatus('ok');

  } catch (err) {
    console.error(err);
    document.getElementById('info-bar').innerHTML =
      `<span style="color:#e8341a">Erreur : ${err.message}</span>`;
    setStatus('');
  }

  document.getElementById('btn-gen').disabled = false;
}

// ── LAYER TOGGLES ────────────────────────────────────────────────
document.getElementById('layer-toggles').addEventListener('click', e => {
  const btn = e.target.closest('.toggle-btn');
  if (!btn) return;
  btn.classList.toggle('active');
  const layerId = btn.dataset.layer;
  const preview = document.getElementById('preview');
  const layer   = preview.querySelector('#' + layerId);
  if (layer) layer.style.display = btn.classList.contains('active') ? '' : 'none';
});

// ── DOWNLOAD ─────────────────────────────────────────────────────
document.getElementById('btn-dl').addEventListener('click', () => {
  if (_builder) _builder.download('patron_maison_medievale.svg');
});

// ── INIT ─────────────────────────────────────────────────────────
buildAddonUI();

document.getElementById('btn-gen').addEventListener('click', generate);

// Génération auto au chargement
generate();
</script>
</body>
</html>
